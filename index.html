<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goat Jump Voice Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <!-- Background Camera Feed -->
        <video id="bg-camera" autoplay playsinline muted></video>

        <!-- Game Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- UI Overlay container -->
        <div id="ui-layer">

            <!-- Start Screen -->
            <div id="start-screen" class="screen active">
                <h1>Goat Jump Voice Challenge</h1>
                <p>🗣️ The goat runs itself! 🐐</p>
                <p>mmmaa (low crying) = Small Jump<br>mmmmmaaaaaaa (high crying) = BIG JUMP!</p>
                <button id="start-btn">Allow Mic & Camera to Start</button>
                <p class="error-msg" id="start-error"></p>
            </div>

            <!-- In-Game UI -->
            <div id="hud-screen" class="screen">
                <div style="display: flex; justify-content: space-between; width: 100%; padding: 20px;">
                    <div class="voice-meter-container" style="position: relative; top: 0; left: 0;">
                        <div class="voice-meter-bg">
                            <div id="voice-meter-fill"></div>
                        </div>
                        <div class="voice-meter-label">Pitch</div>
                    </div>

                    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
                        <div class="score-board" style="position: relative; top: 0; right: 0;">Score: <span
                                id="score-val">0</span></div>
                        <button id="record-btn"
                            style="background: linear-gradient(135deg, #e53935, #b71c1c); padding: 10px 15px; font-size: 14px; width: auto; border-radius: 20px;">⏺
                            Record</button>
                    </div>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="screen">
                <h2>Game Over! 🐐</h2>
                <p>Score: <span id="final-score">0</span></p>

                <div id="screenshot-actions">
                    <button id="screenshot-btn">📸 Take Screenshot</button>
                    <div id="screenshot-preview-container" style="display: none; margin-top: 10px;">
                        <img id="screenshot-preview" src="" alt="Screenshot Preview"
                            style="max-width: 100%; border-radius: 10px; border: 2px solid white; margin-bottom: 10px;">
                        <div class="share-actions">
                            <button id="save-screenshot-btn">💾 Save</button>
                            <button id="share-screenshot-btn">📤 Share</button>
                        </div>
                    </div>
                </div>

                <button id="restart-btn" style="margin-top: 20px;">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/audioAnalyzer.js"></script>
    <script src="js/media.js"></script>
    <script src="js/sfx.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
